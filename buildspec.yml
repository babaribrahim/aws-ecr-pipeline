version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 395063533284.dkr.ecr.us-west-2.amazonaws.com
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t my-html-app:latest .
      - docker tag my-html-app:latest 395063533284.dkr.ecr.us-west-2.amazonaws.com/my-html-app:latest
  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push 395063533284.dkr.ecr.us-west-2.amazonaws.com/my-html-app:latest

artifacts:
  files:
    - appspec.yml
    - scripts/**/*